server {
    listen 80;
    # 💡 Production: Có thể để _ (catch-all) hoặc localhost
    # Nginx trong container chủ yếu handle request đã được forward từ reverse proxy
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    
    #  QUAN TRỌNG: Resolver để Nginx có thể resolve Docker service names
    # Docker's internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # SECURITY NOTE: log_format must be defined in http block (not server block)
    # Since this file is included in /etc/nginx/conf.d/, we cannot define log_format here.
    # The main nginx.conf already has a default log format.
    # Token is now sent via STOMP headers (not query string), so it won't appear in logs anyway.
    # If you need custom log format, add it to /etc/nginx/nginx.conf in a custom Dockerfile.

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    #  index.html - KHÔNG cache (phải đặt TRƯỚC location /)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # Static assets - phải đặt TRƯỚC location / để ưu tiên
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API proxy to backend
    #  Dùng variable để linh hoạt (có thể thay đổi qua environment hoặc build-time)
    # Mặc định: service name 'backend' nếu trong cùng Docker network
    # Có thể override bằng environment variable BACKEND_API_URL
    #  LƯU Ý: Phải dùng variable với resolver để Nginx có thể resolve service name
    set $backend_url http://tagweb_backend:8080;
    
    location /api/ {
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'Upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket support
    location /ws {
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA routing - fallback về index.html cho tất cả routes (phải đặt CUỐI CÙNG)
    location / {
        try_files $uri $uri/ /index.html;
        #  QUAN TRỌNG: Thêm headers để tránh cache issues trên mobile
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}



